name: Release CLI Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g. v0.2.1)"
        required: true
        default: "v0.2.1"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: windows-latest
            target: win-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install deps and build
        run: |
          npm ci
          npm run build

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "deepcode-cli-${{ matrix.target }}"
          cp dist/cli.cjs "deepcode-cli-${{ matrix.target }}/"
          cat > "deepcode-cli-${{ matrix.target }}/deepcode" << 'SHIM'
          #!/usr/bin/env node
          const path = require("path");
          require(path.join(__dirname, "cli.cjs"));
          SHIM
          chmod +x "deepcode-cli-${{ matrix.target }}/deepcode"
          tar czf "deepcode-cli-${{ matrix.target }}.tgz" "deepcode-cli-${{ matrix.target }}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "deepcode-cli-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $dir
          Copy-Item dist/cli.cjs "$dir/"
          Set-Content -Path "$dir/deepcode.cmd" -Value '@node "%~dp0cli.cjs" %*'
          Compress-Archive -Path "$dir/*" -DestinationPath "deepcode-cli-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepcode-cli-${{ matrix.target }}
          path: deepcode-cli-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: artifacts/*
          fail_on_unmatched_files: true
